<!-- Backdrop + Drawer — always in DOM, visibility driven by isOpen -->
<div
  class="gls-drawer-backdrop"
  [class.gls-drawer-backdrop--visible]="isOpen"
  (click)="onBackdropClick($event)"
>
  <aside class="gls-drawer" [class.gls-drawer--open]="isOpen">
    <div class="gls-drawer__header">
      <div class="gls-drawer__title">
        <span class="gls-drawer__icon">📦</span>
        <span>{{ 'addressForm.drawerTitle' | cxTranslate }}</span>
      </div>
      <button
        type="button"
        class="gls-drawer__close"
        (click)="close()"
        [attr.aria-label]="'addressForm.drawerClose' | cxTranslate"
      >
        ✕
      </button>
    </div>

    <div class="gls-drawer__body">
      <!-- Inline GLS widget — always in DOM so ViewChild resolves -->
      <gls-dpm #glsWidget id="gls-dpm-widget"></gls-dpm>
    </div>
  </aside>
</div>

<!-- Trigger button shown in the addressForm form -->
<div class="gls-trigger-section">
  <div class="gls-trigger-label">
    <span class="gls-trigger-label__icon">🗺️</span>
    <span class="gls-trigger-label__text">{{ 'addressForm.triggerLabel' | cxTranslate }}</span>
    <span class="gls-trigger-label__badge">{{ 'addressForm.triggerBadge' | cxTranslate }}</span>
  </div>

  <ng-container *ngIf="selectedShop$ | async as shop; else noShop">
    <div class="gls-selected-card">
      <div class="gls-selected-card__info">
        <span class="gls-selected-card__name">{{ shop.name }}</span>
        <span class="gls-selected-card__addressForm">
          {{ shop.contact.address }}, {{ shop.contact.postalCode }} {{ shop.contact.city }}
        </span>
      </div>
      <button type="button" class="gls-selected-card__change" (click)="open()">
        {{ 'addressForm.changeBtn' | cxTranslate }}
      </button>
    </div>
  </ng-container>

  <ng-template #noShop>
    <button type="button" class="gls-open-btn" (click)="open()">
      <span class="gls-open-btn__icon">📍</span>
      {{ 'addressForm.openBtn' | cxTranslate }}
    </button>
  </ng-template>
</div>
