name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: my-spartacus-app/package-lock.json

      - name: Install
        working-directory: my-spartacus-app
        run: npm ci

      - name: Build
        working-directory: my-spartacus-app
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      - name: SPA Fallback
        working-directory: my-spartacus-app
        run: cp dist/my-spartacus-app/index.html dist/my-spartacus-app/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: my-spartacus-app/dist/my-spartacus-app

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
